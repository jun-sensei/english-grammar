<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW HORIZON準拠 英文法AIマスター</title>
    <!-- ファビコンの404エラーを防止する設定 -->
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // -------------------------------------------------------------------------
        // 重要: ここにあなたのAPIキーを入力してください
        // -------------------------------------------------------------------------
        const apiKey = "AIzaSyDNNmQIwxsiXY88bTTlTzLXQw3a09BSMvA"; 

        const categoriesList = [
            { id: 'be_1', unit: '1年 U1-2', label: 'be動詞(am, are)', desc: '自己紹介や相手への質問' },
            { id: 'be_2', unit: '1年 U2', label: 'be動詞(is)', desc: '人や物の紹介' },
            { id: 'gen_1', unit: '1年 U3', label: '一般動詞(I, You)', desc: '自分の習慣や好み' },
            { id: 'gen_2', unit: '1年 U4', label: '一般動詞(三人称単数)', desc: '他人の紹介' },
            { id: 'can_wh', unit: '1年 U5-6', label: 'can / 疑問詞', desc: 'できること・具体的な質問' },
            { id: 'prog_pres', unit: '1年 U7', label: '現在進行形', desc: '今していること' },
            { id: 'past_be', unit: '1年 U8', label: '過去形(be動詞)', desc: '過去の状態' },
            { id: 'past_reg', unit: '1年 U8-9', label: '過去形(一般動詞)', desc: '過去の出来事' },
            { id: 'prog_past', unit: '1年 U10', label: '過去進行形', desc: 'その時していたこと' },
            { id: 'future', unit: '2年 U1', label: '未来形', desc: 'これからの予定' },
            { id: 'conj', unit: '2年 U2', label: '接続詞(when, ifなど)', desc: '時・条件・理由' },
            { id: 'inf_1', unit: '2年 U3-4', label: '不定詞(基礎)', desc: 'すること・するための' },
            { id: 'modal', unit: '2年 U3', label: '助動詞(must, mayなど)', desc: '義務や推量' },
            { id: 'gerund', unit: '2年 U5', label: '動名詞', desc: '〜すること' },
            { id: 'compare', unit: '2年 U6', label: '比較', desc: '比べる表現' },
            { id: 'passive', unit: '2年 U7-3年 U1', label: '受動態', desc: '〜される' },
            { id: 'perf', unit: '3年 U1-2', label: '現在完了形', desc: '経験・継続・完了' },
            { id: 'inf_syn', unit: '3年 U3', label: '不定詞構文', desc: 'It is~to / tell~to' },
            { id: 'ind_q', unit: '3年 U4', label: '間接疑問文', desc: '〜か知っている' },
            { id: 'participle', unit: '3年 U5', label: '分詞修飾', desc: '〜している名詞' },
            { id: 'rel_pron', unit: '3年 U6', label: '関係代名詞', desc: '人や物の詳しい説明' },
            { id: 'subjunctive', unit: '3年 U7', label: '仮定法', desc: 'もし〜なら（願望）' }
        ];

        const callAI = async (prompt, schema) => {
            if (!apiKey) {
                throw new Error("APIキーが入力されていません。index.html内のapiKey変数を確認してください。");
            }
            // 安定版の 1.5-flash を使用。URLの形式を最新に修正
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: schema,
                    temperature: 1.0
                }
            };

            let lastError;
            for (let i = 0; i < 3; i++) {
                try {
                    console.log(`AI呼び出し試行 ${i+1}...`);
                    const res = await fetch(url, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify(payload) 
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) {
                        console.error("Gemini APIエラー詳細:", data);
                        throw new Error(data.error?.message || "API通信エラーが発生しました");
                    }
                    
                    const textResponse = data.candidates[0].content.parts[0].text;
                    const cleanedJson = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    return JSON.parse(cleanedJson);
                } catch (e) {
                    lastError = e;
                    console.warn(`失敗しました。再試行します...`, e.message);
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw lastError;
        };

        const quizSchema = {
            type: "OBJECT",
            properties: {
                questions: {
                    type: "ARRAY",
                    items: {
                        type: "OBJECT",
                        properties: {
                            type: { type: "STRING" },
                            categoryId: { type: "STRING" },
                            japanese: { type: "STRING" },
                            english_full: { type: "STRING" },
                            english_blank: { type: "STRING" },
                            correct_answer: { type: "STRING" },
                            options: { type: "ARRAY", items: { type: "STRING" } },
                            ordering_words: { type: "ARRAY", items: { type: "STRING" } },
                            explanation: { type: "STRING" }
                        },
                        required: ["type", "categoryId", "japanese", "english_full", "correct_answer", "options", "explanation"]
                    }
                }
            }
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [studentName, setStudentName] = useState('生徒');
            const [selectedCats, setSelectedCats] = useState([]);
            const [questionCount, setQuestionCount] = useState(5);
            const [printCount, setPrintCount] = useState(2);
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [isAnswered, setIsAnswered] = useState(false);
            const [userSelection, setUserSelection] = useState(null);
            const [orderedWords, setOrderedWords] = useState([]);
            const [availableWords, setAvailableWords] = useState([]);
            const [errorMessage, setErrorMessage] = useState("");

            const currentQ = questions[currentIndex];

            const startQuiz = async () => {
                if (selectedCats.length === 0) return;
                setErrorMessage("");
                setView('loading');
                const catLabels = selectedCats.map(id => categoriesList.find(c => c.id === id).label).join(', ');
                
                const prompt = `中学英語の文法問題を作成してください。
単元: ${catLabels}
問題数: ${questionCount}問

【重要指示】
1. 日本語は「〜しているですか」のような機械的な誤りを避け、中学生が理解できる自然な日本語（丁寧語）にしてください。
2. multiple-choice, ordering, translation-choice を均等に混ぜてください。
3. optionsは必ず「4つ」の異なる選択肢を作成してください。
4. orderingでは英文を単語単位で正確に分割してください。`;

                try {
                    const data = await callAI(prompt, quizSchema);
                    if (!data.questions || data.questions.length === 0) throw new Error("問題データが空です");
                    setQuestions(data.questions);
                    setCurrentIndex(0);
                    setScore(0);
                    setIsAnswered(false);
                    setView('quiz');
                } catch (e) {
                    console.error("AI生成プロセス失敗:", e);
                    setErrorMessage(`AI生成に失敗しました。理由: ${e.message}`);
                    setView('home');
                }
            };

            const generatePrint = async () => {
                if (selectedCats.length === 0) return;
                setErrorMessage("");
                setView('loading');
                const catLabels = selectedCats.map(id => categoriesList.find(c => c.id === id).label).join(', ');
                
                const prompt = `中学英語プリント用問題を生成してください。
単元: ${catLabels}
問題数: ${printCount * 3}問。
自然な日本語を使い、穴埋め、並び替え、英訳をバランスよく配置してください。`;

                try {
                    const data = await callAI(prompt, quizSchema);
                    setQuestions(data.questions);
                    setView('print');
                } catch (e) {
                    setErrorMessage(`プリント生成エラー: ${e.message}`);
                    setView('home');
                }
            };

            const handleAnswer = (choice) => {
                if (isAnswered) return;
                setUserSelection(choice);
                setIsAnswered(true);
                const isCorrect = normalizeText(choice) === normalizeText(currentQ.correct_answer) || normalizeText(choice) === normalizeText(currentQ.english_full);
                if (isCorrect) setScore(s => s + 1);
            };

            const handleOrderWord = (word, index, fromAvailable) => {
                if (isAnswered) return;
                if (fromAvailable) {
                    const newAvailable = [...availableWords];
                    newAvailable.splice(index, 1);
                    setAvailableWords(newAvailable);
                    setOrderedWords([...orderedWords, word]);
                } else {
                    const newOrdered = [...orderedWords];
                    newOrdered.splice(index, 1);
                    setOrderedWords(newOrdered);
                    setAvailableWords([...availableWords, word]);
                }
            };

            useEffect(() => {
                if (currentQ?.type === 'ordering') {
                    setOrderedWords([]);
                    setAvailableWords([...currentQ.ordering_words].sort(() => Math.random() - 0.5));
                }
            }, [currentIndex, questions]);

            const normalizeText = (t) => t ? t.replace(/[.?!,]/g, '').toLowerCase().trim() : "";

            if (view === 'loading') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center space-y-6">
                        <div className="text-indigo-600"><i className="fas fa-circle-notch fa-spin fa-4x"></i></div>
                        <h2 className="text-2xl font-bold">AIが問題を作成中です...</h2>
                        <p className="text-slate-400">これには10秒ほどかかる場合があります</p>
                    </div>
                );
            }

            if (view === 'home') {
                return (
                    <div className="max-w-5xl mx-auto p-6 space-y-8">
                        <header className="text-center py-8">
                            <h1 className="text-5xl font-black text-slate-800 mb-2">EngGrammar AI</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm italic">AI-Powered Grammar Mastery</p>
                        </header>

                        {errorMessage && (
                            <div className="bg-rose-50 border-2 border-rose-100 text-rose-700 px-6 py-4 rounded-3xl flex items-center gap-4 animate-bounce">
                                <i className="fas fa-exclamation-circle fa-lg"></i>
                                <div className="flex-1 font-bold">
                                    <p>{errorMessage}</p>
                                    <p className="text-xs opacity-70">※コンソール(F12)で詳細を確認してください</p>
                                </div>
                            </div>
                        )}

                        <div className="bg-white rounded-[2.5rem] shadow-2xl p-8 md:p-12 border border-slate-100">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                <section className="space-y-6">
                                    <div className="bg-slate-50 p-6 rounded-3xl">
                                        <label className="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Learner Name</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-4 py-3 rounded-2xl border-2 border-transparent bg-white focus:border-indigo-500 outline-none transition-all text-lg font-bold"
                                            value={studentName}
                                            onChange={e => setStudentName(e.target.value)}
                                        />
                                    </div>

                                    <div>
                                        <h3 className="text-lg font-black mb-4 flex items-center gap-3 text-slate-800">
                                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs"><i className="fas fa-list"></i></div>
                                            単元を選択してください
                                        </h3>
                                        <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                            {categoriesList.map(cat => (
                                                <label key={cat.id} className={`group flex items-center p-4 border-2 rounded-2xl cursor-pointer transition-all ${selectedCats.includes(cat.id) ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-100 hover:border-indigo-200'}`}>
                                                    <input 
                                                        type="checkbox" 
                                                        className="hidden" 
                                                        checked={selectedCats.includes(cat.id)}
                                                        onChange={() => {
                                                            if (selectedCats.includes(cat.id)) setSelectedCats(selectedCats.filter(i => i !== cat.id));
                                                            else setSelectedCats([...selectedCats, cat.id]);
                                                        }}
                                                    />
                                                    <div className="flex-1">
                                                        <div className={`text-[10px] font-black uppercase tracking-widest mb-1 ${selectedCats.includes(cat.id) ? 'text-indigo-200' : 'text-indigo-500'}`}>{cat.unit}</div>
                                                        <div className="font-bold text-base">{cat.label}</div>
                                                    </div>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${selectedCats.includes(cat.id) ? 'bg-white border-white' : 'border-slate-200 group-hover:border-indigo-300'}`}>
                                                        {selectedCats.includes(cat.id) && <i className="fas fa-check text-indigo-600 text-[10px]"></i>}
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section className="space-y-8 flex flex-col justify-center">
                                    <div className="bg-indigo-50/50 p-8 rounded-[2.5rem] border-2 border-indigo-100 space-y-6">
                                        <div className="flex items-center justify-between">
                                            <p className="font-black text-indigo-900 tracking-tight">Webクイズモード</p>
                                            <div className="flex gap-2">
                                                {[5, 10, 20].map(n => (
                                                    <button key={n} onClick={() => setQuestionCount(n)} className={`w-10 h-10 rounded-xl text-xs font-black transition-all ${questionCount === n ? 'bg-indigo-600 text-white' : 'bg-white text-indigo-400 border border-indigo-200'}`}>{n}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={startQuiz} className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[1.5rem] font-black text-lg shadow-xl shadow-indigo-200 flex items-center justify-center gap-3 transition-transform active:scale-95">
                                            <i className="fas fa-rocket"></i> クイズを開始
                                        </button>
                                    </div>

                                    <div className="bg-emerald-50/50 p-8 rounded-[2.5rem] border-2 border-emerald-100 space-y-6">
                                        <div className="flex items-center justify-between">
                                            <p className="font-black text-emerald-900 tracking-tight">プリント印刷モード</p>
                                            <div className="flex gap-2">
                                                {[1, 2, 3].map(n => (
                                                    <button key={n} onClick={() => setPrintCount(n)} className={`w-10 h-10 rounded-xl text-xs font-black transition-all ${printCount === n ? 'bg-emerald-600 text-white' : 'bg-white text-emerald-400 border border-emerald-200'}`}>{n}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={generatePrint} className="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-[1.5rem] font-black text-lg shadow-xl shadow-emerald-200 flex items-center justify-center gap-3 transition-transform active:scale-95">
                                            <i className="fas fa-print"></i> プリントを生成
                                        </button>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const isCorrect = (currentQ.type !== 'ordering' && userSelection === currentQ.correct_answer) || (currentQ.type === 'ordering' && normalizeText(orderedWords.join(' ')) === normalizeText(currentQ.english_full));

                return (
                    <div className="max-w-3xl mx-auto p-4 flex flex-col min-h-screen justify-center space-y-6">
                        <div className="flex justify-between items-center px-4">
                            <div className="space-y-1">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Question {currentIndex + 1} of {questions.length}</span>
                                <div className="h-2 w-48 bg-slate-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${((currentIndex + 1) / questions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <span className="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-black">{categoriesList.find(c => c.id === currentQ.categoryId)?.label}</span>
                        </div>

                        <div className="bg-white rounded-[3rem] shadow-2xl p-10 md:p-14 border border-slate-100 relative">
                            <h2 className="text-2xl font-bold text-slate-700 mb-10 leading-relaxed underline decoration-slate-100 underline-offset-8">{currentQ.japanese}</h2>
                            
                            {currentQ.type === 'multiple-choice' && (
                                <div className="space-y-12">
                                    <p className="text-3xl font-black text-slate-800 tracking-tight text-center py-8 bg-slate-50 rounded-3xl italic">
                                        {currentQ.english_blank}
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {currentQ.options.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleAnswer(opt)}
                                                disabled={isAnswered}
                                                className={`p-6 rounded-[1.5rem] font-bold border-4 transition-all text-lg ${
                                                    isAnswered 
                                                    ? (opt === currentQ.correct_answer ? 'bg-emerald-500 border-emerald-500 text-white scale-105 shadow-xl' : (opt === userSelection ? 'bg-rose-500 border-rose-500 text-white' : 'border-slate-50 text-slate-200'))
                                                    : 'border-slate-50 bg-slate-50 hover:bg-white hover:border-indigo-500 hover:shadow-lg'
                                                }`}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {currentQ.type === 'ordering' && (
                                <div className="space-y-8">
                                    <div className="min-h-[120px] p-6 bg-slate-50 rounded-[2rem] border-4 border-dashed border-slate-200 flex flex-wrap gap-3 items-center">
                                        {orderedWords.map((w, i) => (
                                            <button key={i} onClick={() => handleOrderWord(w, i, false)} className="px-6 py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-700 transition-transform active:scale-95">{w}</button>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap gap-3 justify-center pt-4">
                                        {availableWords.map((w, i) => (
                                            <button key={i} onClick={() => handleOrderWord(w, i, true)} className="px-6 py-3 bg-white border-2 border-slate-100 text-slate-700 font-bold rounded-2xl hover:border-indigo-400 hover:bg-indigo-50 transition-all shadow-sm">{w}</button>
                                        ))}
                                    </div>
                                    {!isAnswered && (
                                        <button 
                                            onClick={() => handleAnswer(orderedWords.join(' '))}
                                            disabled={orderedWords.length === 0}
                                            className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black text-xl mt-6 shadow-2xl transition-all"
                                        >
                                            解答を送信
                                        </button>
                                    )}
                                </div>
                            )}

                            {currentQ.type === 'translation-choice' && (
                                <div className="space-y-10">
                                    <p className="text-3xl font-black text-indigo-600 tracking-tight text-center py-6 italic leading-snug">
                                        "{currentQ.english_full}"
                                    </p>
                                    <div className="space-y-3">
                                        {currentQ.options.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleAnswer(opt)}
                                                disabled={isAnswered}
                                                className={`w-full p-6 text-left rounded-[1.5rem] font-bold border-4 transition-all text-lg flex items-center gap-4 ${
                                                    isAnswered 
                                                    ? (opt === currentQ.correct_answer ? 'bg-emerald-500 border-emerald-500 text-white' : (opt === userSelection ? 'bg-rose-500 border-rose-500 text-white' : 'border-slate-50 text-slate-200'))
                                                    : 'border-slate-50 bg-slate-50 hover:bg-white hover:border-indigo-500'
                                                }`}
                                            >
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm ${isAnswered ? 'bg-white/20' : 'bg-indigo-100 text-indigo-600'}`}>{i + 1}</div>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {isAnswered && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-8 duration-500">
                                <div className={`p-8 rounded-[3rem] border-4 flex items-start gap-6 shadow-2xl ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                                    <div className="text-5xl mt-2">{isCorrect ? '✨' : '🧐'}</div>
                                    <div className="flex-1">
                                        <h3 className={`font-black text-2xl ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}`}>
                                            {isCorrect ? '完璧です！' : '惜しい！もう一度確認しよう'}
                                        </h3>
                                        <div className="mt-4 p-4 bg-white/60 rounded-2xl border border-white">
                                            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Correct Answer</p>
                                            <p className="font-black text-xl text-slate-800">{currentQ.english_full}</p>
                                        </div>
                                        <p className="text-slate-600 mt-6 font-medium leading-relaxed">{currentQ.explanation}</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => {
                                        if (currentIndex < questions.length - 1) {
                                            setCurrentIndex(currentIndex + 1);
                                            setIsAnswered(false);
                                            setUserSelection(null);
                                        } else {
                                            setView('result');
                                        }
                                    }}
                                    className="w-full py-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[2rem] font-black text-2xl shadow-2xl flex items-center justify-center gap-4 transition-transform active:scale-95"
                                >
                                    {currentIndex < questions.length - 1 ? '次の問題へ進む' : '最終結果を見る'} 
                                    <i className="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                const percentage = Math.round((score / questions.length) * 100);
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-indigo-600">
                        <div className="bg-white rounded-[4rem] shadow-2xl p-12 max-w-lg w-full text-center">
                            <div className="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 text-4xl">
                                <i className="fas fa-award"></i>
                            </div>
                            <h2 className="text-4xl font-black mb-4 tracking-tight text-slate-800">{studentName} さん<br/>お疲れ様でした！</h2>
                            
                            <div className="bg-slate-50 rounded-[3rem] p-10 mb-10 border border-slate-100 space-y-6 text-center">
                                <div>
                                    <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Total Score</p>
                                    <div className="flex items-baseline justify-center gap-3">
                                        <span className="text-8xl font-black text-indigo-600 leading-none">{score}</span>
                                        <span className="text-3xl font-black text-slate-300">/ {questions.length}</span>
                                    </div>
                                </div>
                                <div className="pt-8 border-t border-slate-200">
                                    <div className="text-2xl font-black text-slate-700">{percentage}% Accuracy</div>
                                    <div className="w-full bg-slate-200 h-4 rounded-full mt-4 overflow-hidden p-1">
                                        <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000" style={{ width: `${percentage}%` }}></div>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => setView('home')} className="w-full py-6 bg-slate-900 hover:bg-black text-white rounded-[2rem] font-black text-xl shadow-xl transition-all">
                                最初の画面に戻る
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'print') {
                return (
                    <div className="min-h-screen bg-white">
                        <div className="no-print p-6 bg-slate-900 text-white flex justify-between items-center sticky top-0 z-50">
                            <button onClick={() => setView('home')} className="font-black flex items-center gap-3 hover:text-indigo-400 transition-colors"><i className="fas fa-arrow-left"></i> Homeへ戻る</button>
                            <button onClick={() => window.print()} className="bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-2xl font-black flex items-center gap-3 shadow-xl transition-transform active:scale-95"><i className="fas fa-print"></i> 印刷を開始する</button>
                        </div>

                        <div className="max-w-[210mm] mx-auto p-[25mm] text-black">
                            <div className="flex justify-between items-end border-b-8 border-black pb-8 mb-16">
                                <div className="space-y-4">
                                    <h1 className="text-5xl font-black tracking-tighter">英文法 ステップアップ学習プリント</h1>
                                    <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">AI Generated Custom Worksheet</p>
                                </div>
                                <div className="text-right space-y-6">
                                    <p className="text-2xl font-black">氏名：＿＿＿＿＿＿＿＿＿＿</p>
                                    <div className="flex gap-4 items-center justify-end">
                                        <span className="text-xs font-bold uppercase tracking-widest text-slate-400">Score</span>
                                        <div className="w-20 h-20 border-4 border-black rounded-2xl flex items-center justify-center font-black text-3xl">/</div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-20">
                                {questions.map((q, i) => (
                                    <div key={i} className="space-y-8 break-inside-avoid">
                                        <div className="flex gap-8 items-start">
                                            <div className="bg-black text-white w-12 h-12 rounded-xl flex items-center justify-center font-black text-2xl flex-shrink-0 shadow-lg">{i+1}</div>
                                            <div className="flex-1 pt-1">
                                                <div className="flex justify-between mb-4 items-center">
                                                    <p className="text-2xl font-bold tracking-tight text-slate-900">{q.japanese}</p>
                                                    <span className="text-[10px] font-black border-2 border-slate-200 px-3 py-1 rounded-full uppercase tracking-widest text-slate-400">{categoriesList.find(c => c.id === q.categoryId)?.label}</span>
                                                </div>

                                                {i % 3 === 0 && (
                                                    <div className="space-y-6">
                                                        <p className="text-3xl font-mono tracking-[0.2em] border-b-2 border-slate-100 py-4 bg-slate-50/50 px-6 rounded-2xl">{q.english_blank}</p>
                                                        <div className="flex gap-12 text-sm font-black pl-8 italic text-slate-600">
                                                            {q.options.map((o, idx) => <span key={idx} className="flex items-center gap-2"><div className="w-6 h-6 border-2 border-slate-300 rounded-full flex items-center justify-center text-[10px]">{idx+1}</div> {o}</span>)}
                                                        </div>
                                                    </div>
                                                )}
                                                {i % 3 === 1 && (
                                                    <div className="space-y-6">
                                                        <p className="text-sm font-black bg-slate-50 px-6 py-4 rounded-2xl inline-block border-l-8 border-black shadow-sm">並び替え：[ {q.ordering_words.join(' / ')} ]</p>
                                                        <div className="border-b-2 border-slate-200 h-14 w-full mt-4"></div>
                                                    </div>
                                                )}
                                                {i % 3 === 2 && (
                                                    <div className="space-y-6">
                                                        <div className="border-2 border-slate-100 rounded-3xl h-32 w-full bg-slate-50/20 shadow-inner"></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="page-break"></div>

                            <div className="mt-24 border-t-8 border-slate-100 pt-16">
                                <h2 className="text-4xl font-black mb-12 flex items-center gap-6 text-slate-800"><i className="fas fa-check-double text-indigo-500"></i> 解答とポイント解説</h2>
                                <div className="grid grid-cols-1 gap-12">
                                    {questions.map((q, i) => (
                                        <div key={i} className="bg-slate-50 p-10 rounded-[3rem] border border-slate-100 space-y-6">
                                            <div className="flex justify-between items-center">
                                                <span className="font-black text-indigo-600 uppercase tracking-widest text-xs">Question {i+1}</span>
                                            </div>
                                            <p className="text-2xl font-black text-slate-900 tracking-tight leading-tight italic underline decoration-indigo-200 underline-offset-8">{q.english_full}</p>
                                            <div className="pt-6 border-t border-slate-200">
                                                <p className="text-sm font-medium text-slate-500 leading-relaxed bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">{q.explanation}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
