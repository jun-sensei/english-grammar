<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW HORIZON準拠 英文法AIマスター</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .ordering-dashed { border-style: dashed; border-width: 2px; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const apiKey = "AIzaSyDNNmQIwxsiXY88bTTlTzLXQw3a09BSMvA"; // Canvas環境で自動注入、または自身で設定

        const categoriesList = [
            { id: 'be_1', unit: '1年 U1-2', label: 'be動詞(am, are)', desc: '自己紹介や相手への質問' },
            { id: 'be_2', unit: '1年 U2', label: 'be動詞(is)', desc: '人や物の紹介' },
            { id: 'gen_1', unit: '1年 U3', label: '一般動詞(I, You)', desc: '自分の習慣や好み' },
            { id: 'gen_2', unit: '1年 U4', label: '一般動詞(三人称単数)', desc: '他人の紹介' },
            { id: 'can_wh', unit: '1年 U5-6', label: 'can / 疑問詞', desc: 'できること・具体的な質問' },
            { id: 'prog_pres', unit: '1年 U7', label: '現在進行形', desc: '今していること' },
            { id: 'past_be', unit: '1年 U8', label: '過去形(be動詞)', desc: '過去の状態' },
            { id: 'past_reg', unit: '1年 U8-9', label: '過去形(一般動詞)', desc: '過去の出来事' },
            { id: 'prog_past', unit: '1年 U10', label: '過去進行形', desc: 'その時していたこと' },
            { id: 'future', unit: '2年 U1', label: '未来形', desc: 'これからの予定' },
            { id: 'conj', unit: '2年 U2', label: '接続詞(when, ifなど)', desc: '時・条件・理由' },
            { id: 'inf_1', unit: '2年 U3-4', label: '不定詞(基礎)', desc: 'すること・するための' },
            { id: 'modal', unit: '2年 U3', label: '助動詞(must, mayなど)', desc: '義務や推量' },
            { id: 'gerund', unit: '2年 U5', label: '動名詞', desc: '〜すること' },
            { id: 'compare', unit: '2年 U6', label: '比較', desc: '比べる表現' },
            { id: 'passive', unit: '2年 U7-3年 U1', label: '受動態', desc: '〜される' },
            { id: 'perf', unit: '3年 U1-2', label: '現在完了形', desc: '経験・継続・完了' },
            { id: 'inf_syn', unit: '3年 U3', label: '不定詞構文', desc: 'It is~to / tell~to' },
            { id: 'ind_q', unit: '3年 U4', label: '間接疑問文', desc: '〜か知っている' },
            { id: 'participle', unit: '3年 U5', label: '分詞修飾', desc: '〜している名詞' },
            { id: 'rel_pron', unit: '3年 U6', label: '関係代名詞', desc: '人や物の詳しい説明' },
            { id: 'subjunctive', unit: '3年 U7', label: '仮定法', desc: 'もし〜なら（願望）' }
        ];

        const callAI = async (prompt, schema) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: schema,
                    temperature: 1.0
                }
            };

            let lastError;
            for (let i = 0; i < 3; i++) {
                try {
                    const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error(`API Error: ${res.status}`);
                    const data = await res.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    lastError = e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw lastError;
        };

        const quizSchema = {
            type: "OBJECT",
            properties: {
                questions: {
                    type: "ARRAY",
                    items: {
                        type: "OBJECT",
                        properties: {
                            type: { type: "STRING" },
                            categoryId: { type: "STRING" },
                            japanese: { type: "STRING" },
                            english_full: { type: "STRING" },
                            english_blank: { type: "STRING" },
                            correct_answer: { type: "STRING" },
                            options: { type: "ARRAY", items: { type: "STRING" } },
                            ordering_words: { type: "ARRAY", items: { type: "STRING" } },
                            explanation: { type: "STRING" }
                        },
                        required: ["type", "categoryId", "japanese", "english_full", "correct_answer", "options", "explanation"]
                    }
                }
            }
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [studentName, setStudentName] = useState('生徒');
            const [selectedCats, setSelectedCats] = useState([]);
            const [questionCount, setQuestionCount] = useState(5);
            const [printCount, setPrintCount] = useState(2);
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [isAnswered, setIsAnswered] = useState(false);
            const [userSelection, setUserSelection] = useState(null);
            const [orderedWords, setOrderedWords] = useState([]);
            const [availableWords, setAvailableWords] = useState([]);
            const [stats, setStats] = useState({});
            const [errorMessage, setErrorMessage] = useState("");

            const currentQ = questions[currentIndex];

            const startQuiz = async () => {
                if (selectedCats.length === 0) return;
                setView('loading');
                const catLabels = selectedCats.map(id => categoriesList.find(c => c.id === id).label).join(', ');
                
                const prompt = `中学英語の文法問題を作成してください。
単元: ${catLabels}
問題数: ${questionCount}問

【ルール】
- multiple-choice(穴埋め4択), ordering(整序), translation-choice(和訳4択) を混ぜてください。
- 日本語は「〜しているですか」のような破綻を絶対に避け、自然な日本語（丁寧語）にしてください。
- 各問題で主語や状況を完全に分散させ、全く同じ内容の文が重複しないようにしてください。
- optionsは必ず「4つ」のユニークな選択肢を作成してください。
- explanationは中学生向けの優しい口調で。`;

                try {
                    const data = await callAI(prompt, quizSchema);
                    setQuestions(data.questions);
                    setCurrentIndex(0);
                    setScore(0);
                    setIsAnswered(false);
                    setView('quiz');
                } catch (e) {
                    setErrorMessage("AI生成に失敗しました。時間をおいて再試行してください。");
                    setView('home');
                }
            };

            const generatePrint = async () => {
                if (selectedCats.length === 0) return;
                setView('loading');
                const catLabels = selectedCats.map(id => categoriesList.find(c => c.id === id).label).join(', ');
                
                const prompt = `中学英語のプリント用問題集を作成してください。
単元: ${catLabels}
各単元ごとの問題数: ${printCount}問。

【ステップアップ構成】
- Step 1: 穴埋め基礎 (english_blankを使用)
- Step 2: 並び替え (ordering_wordsを使用)
- Step 3: 全文英訳実践 (japaneseからenglish_fullを導く)

【厳守】
- 全く同じ文、同じシチュエーションを繰り返さないでください。
- 日本語訳を洗練させ、教材として正しい日本語にしてください。`;

                try {
                    const data = await callAI(prompt, quizSchema);
                    setQuestions(data.questions);
                    setView('print');
                } catch (e) {
                    setErrorMessage("プリント生成に失敗しました。");
                    setView('home');
                }
            };

            const handleAnswer = (choice) => {
                if (isAnswered) return;
                setUserSelection(choice);
                setIsAnswered(true);
                const correct = choice === currentQ.correct_answer;
                if (correct) setScore(s => s + 1);

                const catId = currentQ.categoryId;
                setStats(prev => ({
                    ...prev,
                    [catId]: {
                        total: (prev[catId]?.total || 0) + 1,
                        correct: (prev[catId]?.correct || 0) + (correct ? 1 : 0)
                    }
                }));
            };

            const handleOrderWord = (word, index, fromAvailable) => {
                if (isAnswered) return;
                if (fromAvailable) {
                    const newAvailable = [...availableWords];
                    newAvailable.splice(index, 1);
                    setAvailableWords(newAvailable);
                    setOrderedWords([...orderedWords, word]);
                } else {
                    const newOrdered = [...orderedWords];
                    newOrdered.splice(index, 1);
                    setOrderedWords(newOrdered);
                    setAvailableWords([...availableWords, word]);
                }
            };

            useEffect(() => {
                if (currentQ?.type === 'ordering') {
                    setOrderedWords([]);
                    setAvailableWords(shuffle([...currentQ.ordering_words]));
                }
            }, [currentIndex, questions]);

            const normalizeText = (t) => t ? t.replace(/[.?!,]/g, '').toLowerCase().trim() : "";

            if (view === 'loading') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center space-y-4">
                        <div className="animate-spin text-indigo-600"><i className="fas fa-circle-notch fa-4x"></i></div>
                        <h2 className="text-xl font-bold">AIが最高の問題を構成中...</h2>
                        <p className="text-slate-500">日本語の自然さと、単元の組み合わせを調整しています。</p>
                    </div>
                );
            }

            if (view === 'home') {
                return (
                    <div className="max-w-5xl mx-auto p-6 space-y-8">
                        <header className="text-center py-8">
                            <h1 className="text-5xl font-black text-slate-800 mb-2 tracking-tight">EngGrammar AI</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">New Horizon Curriculum Mastery</p>
                        </header>

                        {errorMessage && (
                            <div className="bg-rose-100 border border-rose-200 text-rose-700 px-6 py-4 rounded-2xl flex items-center gap-3">
                                <i className="fas fa-exclamation-triangle"></i>
                                <span className="font-bold">{errorMessage}</span>
                            </div>
                        )}

                        <div className="bg-white rounded-[2rem] shadow-2xl p-8 md:p-12 border border-slate-100">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                <section className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-black text-slate-400 uppercase tracking-widest mb-2">Learner Name</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-6 py-4 rounded-2xl border-2 border-slate-50 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none transition-all text-lg font-bold"
                                            value={studentName}
                                            onChange={e => setStudentName(e.target.value)}
                                        />
                                    </div>

                                    <div>
                                        <h3 className="text-lg font-black mb-4 flex items-center gap-2 text-slate-800">
                                            <i className="fas fa-bullseye text-indigo-600"></i> 学習単元の選択
                                        </h3>
                                        <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                            {categoriesList.map(cat => (
                                                <label key={cat.id} className={`group flex items-center p-4 border-2 rounded-2xl cursor-pointer transition-all ${selectedCats.includes(cat.id) ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-100 hover:border-indigo-200'}`}>
                                                    <input 
                                                        type="checkbox" 
                                                        className="hidden" 
                                                        checked={selectedCats.includes(cat.id)}
                                                        onChange={() => {
                                                            if (selectedCats.includes(cat.id)) setSelectedCats(selectedCats.filter(i => i !== cat.id));
                                                            else setSelectedCats([...selectedCats, cat.id]);
                                                        }}
                                                    />
                                                    <div className="flex-1">
                                                        <div className={`text-[10px] font-black uppercase tracking-widest mb-1 ${selectedCats.includes(cat.id) ? 'text-indigo-200' : 'text-indigo-500'}`}>{cat.unit}</div>
                                                        <div className="font-bold text-base">{cat.label}</div>
                                                        <div className={`text-xs ${selectedCats.includes(cat.id) ? 'text-indigo-100' : 'text-slate-400'}`}>{cat.desc}</div>
                                                    </div>
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${selectedCats.includes(cat.id) ? 'bg-white border-white' : 'border-slate-200 group-hover:border-indigo-300'}`}>
                                                        {selectedCats.includes(cat.id) && <i className="fas fa-check text-indigo-600 text-xs"></i>}
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section className="space-y-10 flex flex-col justify-center">
                                    <div className="bg-indigo-50/50 p-8 rounded-[2rem] space-y-6">
                                        <div className="flex items-center justify-between">
                                            <p className="font-black text-indigo-900 tracking-tight">Webクイズ</p>
                                            <div className="flex gap-1">
                                                {[5, 10, 20].map(n => (
                                                    <button key={n} onClick={() => setQuestionCount(n)} className={`w-10 h-10 rounded-full text-xs font-black transition-all ${questionCount === n ? 'bg-indigo-600 text-white' : 'bg-white text-indigo-400 border border-indigo-100 hover:bg-indigo-100'}`}>{n}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={startQuiz} className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 flex items-center justify-center gap-3 transition-transform active:scale-95">
                                            <i className="fas fa-play"></i> クイズを開始する
                                        </button>
                                    </div>

                                    <div className="bg-emerald-50/50 p-8 rounded-[2rem] space-y-6">
                                        <div className="flex items-center justify-between">
                                            <p className="font-black text-emerald-900 tracking-tight">手書きプリント</p>
                                            <div className="flex gap-1">
                                                {[1, 2, 3].map(n => (
                                                    <button key={n} onClick={() => setPrintCount(n)} className={`w-10 h-10 rounded-full text-xs font-black transition-all ${printCount === n ? 'bg-emerald-600 text-white' : 'bg-white text-emerald-400 border border-emerald-100 hover:bg-emerald-100'}`}>{n}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={generatePrint} className="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-black text-lg shadow-xl shadow-emerald-100 flex items-center justify-center gap-3 transition-transform active:scale-95">
                                            <i className="fas fa-print"></i> プリントを生成する
                                        </button>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const isCorrect = (currentQ.type !== 'ordering' && userSelection === currentQ.correct_answer) || (currentQ.type === 'ordering' && normalizeText(orderedWords.join(' ')) === normalizeText(currentQ.english_full));

                return (
                    <div className="max-w-3xl mx-auto p-4 flex flex-col min-h-screen justify-center space-y-6">
                        <div className="flex justify-between items-center px-4">
                            <div className="space-y-1">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Question {currentIndex + 1} of {questions.length}</span>
                                <div className="h-2 w-48 bg-slate-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${((currentIndex + 1) / questions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <span className="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-black">{categoriesList.find(c => c.id === currentQ.categoryId)?.label}</span>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-14 border border-slate-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8">
                                <span className="text-slate-100 text-8xl font-black">{currentIndex + 1}</span>
                            </div>
                            
                            <h2 className="text-2xl font-bold text-slate-600 mb-8 leading-relaxed z-10 relative">{currentQ.japanese}</h2>
                            
                            {currentQ.type === 'multiple-choice' && (
                                <div className="space-y-10 relative z-10">
                                    <p className="text-3xl font-black text-slate-800 tracking-wide text-center py-6 border-y-2 border-slate-50 italic">
                                        {currentQ.english_blank}
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {currentQ.options.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleAnswer(opt)}
                                                disabled={isAnswered}
                                                className={`p-6 rounded-3xl font-bold border-4 transition-all text-lg ${
                                                    isAnswered 
                                                    ? (opt === currentQ.correct_answer ? 'bg-emerald-500 border-emerald-500 text-white scale-105 shadow-lg shadow-emerald-100' : (opt === userSelection ? 'bg-rose-500 border-rose-500 text-white' : 'border-slate-50 text-slate-200'))
                                                    : 'border-slate-50 bg-slate-50 hover:bg-white hover:border-indigo-500 hover:shadow-xl'
                                                }`}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {currentQ.type === 'ordering' && (
                                <div className="space-y-8 relative z-10">
                                    <div className="min-h-[100px] p-6 bg-slate-50 rounded-[2rem] border-4 border-dashed border-slate-200 flex flex-wrap gap-3 items-center">
                                        {orderedWords.map((w, i) => (
                                            <button key={i} onClick={() => handleOrderWord(w, i, false)} className="px-6 py-3 bg-indigo-600 text-white font-black rounded-2xl shadow-lg transition-transform active:scale-95">{w}</button>
                                        ))}
                                    </div>
                                    <div className="flex flex-wrap gap-3 justify-center">
                                        {availableWords.map((w, i) => (
                                            <button key={i} onClick={() => handleOrderWord(w, i, true)} className="px-6 py-3 bg-white border-2 border-slate-100 text-slate-700 font-bold rounded-2xl hover:border-indigo-400 hover:bg-indigo-50 transition-all shadow-sm">{w}</button>
                                        ))}
                                    </div>
                                    {!isAnswered && (
                                        <button 
                                            onClick={() => handleAnswer(orderedWords.join(' '))}
                                            disabled={orderedWords.length === 0}
                                            className="w-full py-5 bg-slate-900 hover:bg-black text-white rounded-[2rem] font-black text-lg shadow-xl transition-all disabled:opacity-50"
                                        >
                                            回答をチェックする
                                        </button>
                                    )}
                                </div>
                            )}

                            {currentQ.type === 'translation-choice' && (
                                <div className="space-y-10 relative z-10">
                                    <p className="text-3xl font-black text-indigo-600 tracking-tight text-center py-6 italic leading-snug">
                                        "{currentQ.english_full}"
                                    </p>
                                    <div className="space-y-3">
                                        {currentQ.options.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleAnswer(opt)}
                                                disabled={isAnswered}
                                                className={`w-full p-6 text-left rounded-3xl font-bold border-4 transition-all text-lg ${
                                                    isAnswered 
                                                    ? (opt === currentQ.correct_answer ? 'bg-emerald-500 border-emerald-500 text-white shadow-lg' : (opt === userSelection ? 'bg-rose-500 border-rose-500 text-white' : 'border-slate-50 text-slate-200'))
                                                    : 'border-slate-50 bg-slate-50 hover:bg-white hover:border-indigo-500'
                                                }`}
                                            >
                                                <span className="inline-block w-8 h-8 rounded-full bg-white/20 text-center leading-8 mr-3">{i + 1}</span>
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {isAnswered && (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-6 duration-700">
                                <div className={`p-8 rounded-[2.5rem] border-4 flex items-start gap-6 shadow-xl ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                                    <div className="text-5xl mt-2">{isCorrect ? '🌟' : '🧐'}</div>
                                    <div className="flex-1">
                                        <h3 className={`font-black text-2xl ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}`}>
                                            {isCorrect ? '大正解！その調子！' : '惜しい！もう一息だよ！'}
                                        </h3>
                                        <div className="mt-4 space-y-2">
                                            <p className="text-slate-500 text-xs font-black uppercase tracking-widest">Correct Answer</p>
                                            <p className="font-black text-xl text-slate-800 underline decoration-indigo-200 underline-offset-4">{currentQ.english_full}</p>
                                        </div>
                                        <p className="text-slate-600 mt-6 font-medium leading-relaxed bg-white/50 p-4 rounded-2xl">{currentQ.explanation}</p>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => {
                                        if (currentIndex < questions.length - 1) {
                                            setCurrentIndex(currentIndex + 1);
                                            setIsAnswered(false);
                                            setUserSelection(null);
                                        } else {
                                            setView('result');
                                        }
                                    }}
                                    className="w-full py-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[2rem] font-black text-2xl shadow-2xl flex items-center justify-center gap-3 transition-transform active:scale-95"
                                >
                                    {currentIndex < questions.length - 1 ? '次の問題へ進む' : '最終結果を見る'} 
                                    <i className="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'result') {
                const percentage = Math.round((score / questions.length) * 100);
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-white rounded-[3.5rem] shadow-2xl p-12 max-w-lg w-full text-center border border-slate-100">
                            <div className="w-32 h-32 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 text-5xl">
                                <i className="fas fa-award"></i>
                            </div>
                            <h2 className="text-4xl font-black mb-4 tracking-tight">{studentName} さん<br/>お疲れ様！</h2>
                            <p className="text-slate-400 font-bold mb-10 uppercase tracking-widest text-sm">Learning Session Completed</p>
                            
                            <div className="bg-slate-50 rounded-[2.5rem] p-10 mb-10 border border-slate-100 space-y-6">
                                <div className="space-y-2">
                                    <p className="text-sm font-black text-slate-400 uppercase tracking-widest">Your Score</p>
                                    <div className="flex items-baseline justify-center gap-3">
                                        <span className="text-8xl font-black text-indigo-600 leading-none">{score}</span>
                                        <span className="text-3xl font-black text-slate-300">/ {questions.length}</span>
                                    </div>
                                </div>
                                <div className="pt-6 border-t border-slate-200">
                                    <div className="text-2xl font-black text-slate-700">{percentage}% Accuracy</div>
                                    <div className="w-full bg-slate-200 h-3 rounded-full mt-3 overflow-hidden">
                                        <div className="h-full bg-indigo-500" style={{ width: `${percentage}%` }}></div>
                                    </div>
                                </div>
                            </div>

                            <button onClick={() => setView('home')} className="w-full py-6 bg-slate-900 hover:bg-black text-white rounded-[2rem] font-black text-xl shadow-xl transition-all active:scale-95">
                                ホームに戻って再挑戦
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'print') {
                return (
                    <div className="min-h-screen bg-white">
                        <div className="no-print p-6 bg-slate-900 text-white flex justify-between items-center sticky top-0 z-50">
                            <button onClick={() => setView('home')} className="font-black flex items-center gap-2 hover:text-indigo-300 transition-colors uppercase tracking-widest text-sm">
                                <i className="fas fa-arrow-left"></i> Back to Home
                            </button>
                            <div className="flex items-center gap-4">
                                <span className="text-xs font-bold text-slate-400">用紙サイズ: A4推奨</span>
                                <button onClick={() => window.print()} className="bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-2xl font-black flex items-center gap-3 shadow-lg transition-transform active:scale-95">
                                    <i className="fas fa-print"></i> 印刷する
                                </button>
                            </div>
                        </div>

                        <div className="max-w-[210mm] mx-auto p-[25mm] text-black">
                            <div className="flex justify-between items-end border-b-8 border-black pb-6 mb-12">
                                <div className="space-y-2">
                                    <h1 className="text-4xl font-black tracking-tighter">英文法 ステップアップ・プリント</h1>
                                    <p className="text-sm font-bold text-slate-500 uppercase tracking-widest">Grammar Worksheet Generated by AI</p>
                                </div>
                                <div className="text-right space-y-4">
                                    <p className="text-2xl font-black">氏名：＿＿＿＿＿＿＿＿＿＿</p>
                                    <div className="flex gap-2 items-center justify-end">
                                        <span className="text-xs font-bold">得点</span>
                                        <div className="w-16 h-16 border-4 border-black rounded-xl flex items-center justify-center font-black text-2xl">/</div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-16">
                                {questions.map((q, i) => (
                                    <div key={i} className="space-y-6 break-inside-avoid">
                                        <div className="flex gap-6 items-start">
                                            <div className="bg-black text-white w-10 h-10 rounded-lg flex items-center justify-center font-black text-xl flex-shrink-0">
                                                {i+1}
                                            </div>
                                            <div className="flex-1 pt-1">
                                                <div className="flex justify-between items-center mb-4">
                                                    <p className="text-xl font-bold">{q.japanese}</p>
                                                    <span className="text-[10px] font-black border-2 border-slate-200 px-2 rounded tracking-widest uppercase text-slate-400">
                                                        {categoriesList.find(c => c.id === q.categoryId)?.label}
                                                    </span>
                                                </div>

                                                {q.type === 'multiple-choice' && (
                                                    <div className="space-y-6">
                                                        <p className="text-2xl font-mono tracking-widest bg-slate-50 p-4 rounded-xl border border-slate-100">{q.english_blank}</p>
                                                        <div className="flex gap-10 text-sm font-black pl-4">
                                                            {q.options.map((o, idx) => <span key={idx} className="flex items-center gap-2"><span className="w-6 h-6 rounded-full border-2 border-black flex items-center justify-center text-[10px]">{idx+1}</span> {o}</span>)}
                                                        </div>
                                                    </div>
                                                )}
                                                {q.type === 'ordering' && (
                                                    <div className="space-y-8">
                                                        <p className="text-sm font-black bg-slate-100 px-4 py-3 rounded-xl inline-block border-l-4 border-black">語群：[ {shuffle([...q.ordering_words]).join(' / ')} ]</p>
                                                        <div className="border-b-2 border-slate-300 h-10 w-full"></div>
                                                    </div>
                                                )}
                                                {q.type === 'translation-choice' && (
                                                    <div className="space-y-8">
                                                        <p className="text-xs font-black text-slate-400 italic mb-2">※下の枠内に英語で正しく書き直しなさい</p>
                                                        <div className="border-2 border-slate-200 rounded-2xl h-24 w-full bg-slate-50/30"></div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="page-break"></div>

                            <div className="mt-20 border-t-8 border-slate-100 pt-12">
                                <h2 className="text-3xl font-black mb-10 flex items-center gap-4">
                                    <i className="fas fa-key text-indigo-500"></i> 解答と解説
                                </h2>
                                <div className="grid grid-cols-1 gap-8">
                                    {questions.map((q, i) => (
                                        <div key={i} className="bg-slate-50 p-8 rounded-[2rem] border border-slate-100 space-y-4">
                                            <div className="flex items-center justify-between">
                                                <span className="font-black text-indigo-600 uppercase tracking-widest text-xs">Question {i+1} Result</span>
                                                <span className="text-[10px] font-bold text-slate-400">{categoriesList.find(c => c.id === q.categoryId)?.label}</span>
                                            </div>
                                            <p className="text-xl font-black text-slate-900 tracking-tight leading-tight">{q.english_full}</p>
                                            <div className="flex items-start gap-3 mt-4 pt-4 border-t border-slate-200">
                                                <span className="bg-indigo-600 text-white text-[10px] font-black px-2 py-1 rounded-md uppercase">Point</span>
                                                <p className="text-sm font-medium text-slate-600 leading-relaxed">{q.explanation}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
